<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rider Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Uber Clone - Rider</span>
        <button class="btn btn-outline-light" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container dashboard-container">

    <div class="row justify-content-center">

        <!-- Ride Request Card -->
        <div class="col-md-6">
            <div class="card shadow p-4">

                <h4 class="text-center mb-3">Request a Ride</h4>

                <input id="pickupLatitude" class="form-control mb-2" placeholder="Pickup Latitude">
                <input id="pickupLongitude" class="form-control mb-2" placeholder="Pickup Longitude">
                <input id="dropLatitude" class="form-control mb-2" placeholder="Drop Latitude">
                <input id="dropLongitude" class="form-control mb-3" placeholder="Drop Longitude">

                <div id="map" style="height: 350px; margin-bottom: 15px;"></div>

                <div id="loadingSpinner" class="text-center mb-2" style="display:none;">
                    Finding driver...
                </div>

                <button id="requestBtn" class="btn btn-primary w-100" onclick="requestRide()">
                    Request Ride
                </button>
                <button id="cancelBtn" class="btn btn-danger w-100 mt-2"
                    onclick="cancelRide()" disabled>
                    Cancel Ride
                </button>

            </div>

            <!-- Status Card -->
            <div class="card shadow p-3 mt-3 text-center">
                <div id="rideDetails">
                    <p><strong>Status:</strong> <span id="rideStatus">None</span></p>
                    <p><strong>Driver:</strong> <span id="driverName">-</span></p>
                    <p><strong>Vehicle:</strong> <span id="vehicleNumber">-</span></p>
                    <p><strong>Estimated Fare:</strong> <span id="fareAmount">-</span></p>
                </div>
            </div>

        </div>

    </div>

</div>

<script>
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* =========================
   MAP INITIALIZATION
========================= */
var map = L.map('map').setView([23.2599, 77.4126], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);


/* =========================
   SMART PICKUP + DROP
========================= */

let pickupMarker = null;
let dropMarker = null;
let pickupSet = false;

// Try to get live location
if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(
        function(position) {

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            map.setView([lat, lng], 15);

            document.getElementById("pickupLatitude").value = lat;
            document.getElementById("pickupLongitude").value = lng;

            pickupMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup("Your Current Location")
                .openPopup();

            pickupSet = true; // IMPORTANT
        },
        function(error) {
            console.log("Location permission denied.");
            alert("Location not enabled. Click map to select pickup.");
        }
    );

}

// Map click logic
map.on('click', function(e) {

    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    // If pickup not set yet → set pickup
    if (!pickupSet) {

        document.getElementById("pickupLatitude").value = lat;
        document.getElementById("pickupLongitude").value = lng;

        if (pickupMarker) map.removeLayer(pickupMarker);

        pickupMarker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup("Pickup Location")
            .openPopup();

        pickupSet = true;

    } else {

        // Otherwise set drop
        document.getElementById("dropLatitude").value = lat;
        document.getElementById("dropLongitude").value = lng;

        if (dropMarker) {
            dropMarker.setLatLng([lat, lng]);
        } else {
            dropMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup("Drop Location")
                .openPopup();
        }
    }
});

/* =========================
   LIVE DRIVER MARKERS
========================= */
let driverMarkers = [];
let assignedDriverMarker = null;
let assignedDriverId = null;

function loadNearbyDrivers() {

    const lat = document.getElementById("pickupLatitude").value;
    const lng = document.getElementById("pickupLongitude").value;

    if (!lat || !lng) return;

    fetch(`http://localhost:8080/driver/nearby?lat=${lat}&lng=${lng}&radiusKm=15`)
        .then(res => res.json())
        .then(drivers => {

            // Remove old markers
            driverMarkers.forEach(marker => map.removeLayer(marker));
            driverMarkers = [];

            // Add new driver markers
            drivers.forEach(driver => {
                const marker = L.marker([
                    driver.currentLatitude,
                    driver.currentLongitude
                ])
                .addTo(map)
                .bindPopup("Driver ID: " + driver.id);

                driverMarkers.push(marker);
            });
        })
        .catch(err => console.error("Driver fetch error:", err));
}

// Refresh every 5 seconds
setInterval(loadNearbyDrivers, 5000);

function startDriverTracking(driverId) {

    assignedDriverId = driverId;

    setInterval(fetchDriverLocation, 3000);
}

function fetchDriverLocation() {

    if (!assignedDriverId) return;

    fetch(`http://10.50.21.250:8080/driver/${assignedDriverId}/location`)
        .then(res => res.json())
        .then(driver => {

            const lat = driver.currentLatitude;
            const lng = driver.currentLongitude;

            if (!lat || !lng) return;

            // FIRST TIME create marker
            if (!assignedDriverMarker) {

                assignedDriverMarker = L.marker([lat, lng])
                    .addTo(map)
                    .bindPopup("Your Driver");

            } 
            // AFTER THAT just move marker
            else {

                assignedDriverMarker.setLatLng([lat, lng]);

            }

        })
        .catch(err => console.error("Driver tracking error:", err));
}

</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/rider.js"></script>
</body>
</html>
